// Dependency-aware schedule: topological sort + forward pass
// Ideal dates work backward from CS. Predecessor constraints push submit dates later.
function computeSchedule(permits,scs,bcs){
  const pMap=Object.fromEntries(permits.map(p=>[p.id,p]));
  const inDeg=Object.fromEntries(permits.map(p=>[p.id,0]));
  permits.forEach(p=>p.predecessors.forEach(dep=>{if(pMap[dep])inDeg[p.id]=(inDeg[p.id]||0)+1;}));
  const queue=permits.filter(p=>!inDeg[p.id]).map(p=>p.id);
  const order=[];const visited=new Set(queue);
  while(queue.length){
    const id=queue.shift();order.push(id);
    permits.forEach(p=>{if(p.predecessors.includes(id)&&!visited.has(p.id)){inDeg[p.id]--;if(inDeg[p.id]<=0){visited.add(p.id);queue.push(p.id);}}});
  }
  permits.forEach(p=>{if(!visited.has(p.id))order.push(p.id);});
  const result={};
  for(const id of order){
    const p=pMap[id];if(!p)continue;
    const cs=getCS(p,scs,bcs);
    const idealSubmit=cs?addDays(cs,-(p.rw+p.nw+p.lb)*7):null;
    // Predecessor constraint: cannot submit until all predecessors are issued
    let predConstraint=null;
    for(const depId of p.predecessors){
      const dep=result[depId];
      if(dep&&dep.issued){if(!predConstraint||dep.issued>predConstraint)predConstraint=dep.issued;}
    }
    let actualSubmit=idealSubmit;let constrained=false;
    if(predConstraint&&(!actualSubmit||predConstraint>actualSubmit)){actualSubmit=predConstraint;constrained=true;}
    // Issued = submit + review weeks (forward pass; NOT backward from CS)
    const actualIssued=actualSubmit?addDays(actualSubmit,p.rw*7):null;
    // NTP end = issued + ntp weeks
    const ntpEnd=actualIssued?addDays(actualIssued,p.nw*7):null;
    result[id]={submit:actualSubmit,issued:actualIssued,ntpEnd,cs,constrained};
  }
  return result;
}

          <div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap",marginBottom:2}}>
            <span style={{fontWeight:700,fontSize:12,color:"#0f172a"}}>{a.name}</span>
            <Chip l={a.tag} bg={a.tagBg} c={a.tagC}/>
            {a.hi&&<Chip l="High Priority" bg="#fef2f2" c="#dc2626"/>}
          </div>
          <div style={{fontSize:10,color:"#64748b"}}>To: {a.agency}</div>
        </div>
        <span style={{color:"#94a3b8",fontSize:12}}>{isE?"▲":"▼"}</span>
      </div>
      {isE&&<div style={{borderTop:"1px solid #f1f5f9",padding:"10px 12px",background:"#f8fafc"}}>
        <div style={{marginBottom:7}}><div style={{fontSize:9,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",marginBottom:2}}>Subject</div><div style={{fontSize:11,color:"#334155",fontWeight:600,background:"white",border:"1px solid #e2e8f0",borderRadius:4,padding:"4px 8px"}}>{a.subject}</div></div>
        <div style={{marginBottom:8}}><div style={{fontSize:9,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",marginBottom:2}}>Body</div><pre style={{fontSize:11,color:"#334155",background:"white",border:"1px solid #e2e8f0",borderRadius:4,padding:"7px 9px",whiteSpace:"pre-wrap",wordBreak:"break-word",fontFamily:"system-ui,sans-serif",lineHeight:1.6,maxHeight:220,overflowY:"auto"}}>{a.body}</pre></div>
        <button onClick={()=>copy(`Subject: ${a.subject}\n\n${a.body}`,a.id)} style={{padding:"4px 11px",borderRadius:4,border:"none",background:copied===a.id?"#15803d":"#0f172a",color:"white",cursor:"pointer",fontSize:11,fontWeight:600,marginRight:5}}>{copied===a.id?"✓ Copied!":"Copy Email"}</button>
        <button onClick={()=>copy(a.subject,`s_${a.id}`)} style={{padding:"4px 11px",borderRadius:4,border:"1px solid #e2e8f0",background:"white",color:"#475569",cursor:"pointer",fontSize:11}}>{copied===`s_${a.id}`?"✓":"Copy Subject"}</button>
      </div>}
    </div>;})}
  </div>;
}
function Legend(){
  const[open,setOpen]=useState(false);
  const groups=[
    {l:"Jurisdiction",items:[{bg:"#fef2f2",c:"#991b1b",l:"Federal"},{bg:"#eff6ff",c:"#1e40af",l:"State"},{bg:"#f0fdf4",c:"#15803d",l:"Local"}]},
    {l:"Responsibility",items:[{bg:"#eff6ff",c:"#1d4ed8",l:"Owner",n:"owner procures"},{bg:"#faf5ff",c:"#7c3aed",l:"GC",n:"GC procures"},{bg:"#f0f9ff",c:"#0369a1",l:"Compl.",n:"no application"},{bg:"#fff7ed",c:"#92400e",l:"Ops",n:"ongoing"}]},
    {l:"Basis",items:[{bg:"#dcfce7",c:"#15803d",l:"Cited",n:"specific reg sourced"},{bg:"#dbeafe",c:"#1e40af",l:"Estimated",n:"professional estimate"},{bg:"#fef3c7",c:"#92400e",l:"Verify",n:"do not schedule"}]},
    {l:"Flags",items:[{bg:"#dc2626",c:"white",l:"CP",n:"critical path"},{bg:"#ea580c",c:"white",l:"SWO",n:"stop-work risk"},{bg:"#f59e0b",c:"white",l:"Gap",n:"AHJ unconfirmed"}]},
    {l:"Urgency",items:[{bg:"#1e293b",c:"white",l:"Overdue"},{bg:"#fef2f2",c:"#dc2626",l:"Urgent",n:"<30d"},{bg:"#fef9c3",c:"#92400e",l:"Soon",n:"<90d"},{bg:"#f0fdf4",c:"#15803d",l:"Upcoming"}]},
  ];
  return<div style={{borderTop:"1px solid #e2e8f0",background:"white",flexShrink:0}}>
    <button onClick={()=>setOpen(x=>!x)} style={{width:"100%",padding:"4px 14px",background:"#f8fafc",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:6,textAlign:"left"}}>
      <span style={{fontSize:9,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.05em"}}>Legend</span>
      <span style={{fontSize:9,color:"#94a3b8"}}>{open?"▲":"▼"}</span>
    </button>
    {open&&<div style={{padding:"8px 14px 10px",display:"flex",gap:16,flexWrap:"wrap",borderTop:"1px solid #f1f5f9",background:"#f8fafc"}}>
      {groups.map(g=><div key={g.l}>
        <div style={{fontSize:8,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>{g.l}</div>
        <div style={{display:"flex",flexDirection:"column",gap:3}}>
          {g.items.map(item=><div key={item.l} style={{display:"flex",alignItems:"center",gap:4}}>
            <Chip l={item.l} bg={item.bg} c={item.c}/>
            {item.n&&<span style={{fontSize:9,color:"#64748b"}}>{item.n}</span>}
          </div>)}
        </div>
      </div>)}
    </div>}
  </div>;
}
function Percy(){
  const[form,setForm]=useState(INIT);
  const[filterCat,setFilterCat]=useState("All");
  const[filterMatrix,setFilterMatrix]=useState("All");
  const[filterResp,setFilterResp]=useState("All");
  const[filterSub,setFilterSub]=useState("All");
  const[showGaps,setShowGaps]=useState(false);
  const[showCP,setShowCP]=useState(false);
  const[showRT,setShowRT]=useState(false);
  const[sortBy,setSortBy]=useState("default");
  const[tab,setTab]=useState("summary");
  const[subTab,setSubTab]=useState("matrix");
  const[expanded,setExpanded]=useState(null);
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const updCounty=c=>setForm(f=>{const db=(ADB[f.state]||{})[c];return{...f,county:c,...(db?{attainment:db.s}:{})};});
  const updState=s=>setForm(f=>({...f,state:s,county:"",attainment:INIT.attainment}));
  const stateCounties=useMemo(()=>Object.keys(ADB[form.state]||{}),[form.state]);
  const attAuto=useMemo(()=>(ADB[form.state]||{})[form.county]||null,[form.state,form.county]);
  const permits=useMemo(()=>buildPermits(form),[form]);
  const subcats=useMemo(()=>["All",...Array.from(new Set(permits.map(p=>p.subcategory))).sort()],[permits]);
  const filtered=useMemo(()=>permits.filter(p=>{
    if(filterCat!=="All"&&p.category!==filterCat)return false;
    if(filterMatrix!=="All"&&p.matrix!==filterMatrix)return false;
    if(filterResp!=="All"&&p.resp!==filterResp)return false;
    if(filterSub!=="All"&&p.subcategory!==filterSub)return false;
    if(showGaps&&!p.gap)return false;if(showCP&&!p.critical_path)return false;if(showRT&&!p.red_tag)return false;
    return true;
  }),[permits,filterCat,filterMatrix,filterResp,filterSub,showGaps,showCP,showRT]);
  const hasFilter=filterCat!=="All"||filterMatrix!=="All"||filterResp!=="All"||filterSub!=="All"||showGaps||showCP||showRT||sortBy!=="default";
  const clearFilter=()=>{setFilterCat("All");setFilterMatrix("All");setFilterResp("All");setFilterSub("All");setShowGaps(false);setShowCP(false);setShowRT(false);setSortBy("default");};
  const stateNote=SNOTES[form.state];
  const TABS=[["summary","Summary"],["permits","Permits"]];
  return<div style={{display:"flex",flexDirection:"column",height:"100vh",fontFamily:"system-ui,sans-serif",background:"#f8fafc"}}>
    <div style={{background:"#0f172a",color:"white",padding:"9px 14px",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
      <b style={{fontSize:16,letterSpacing:"-.5px"}}>PERCY</b>
      <span style={{fontSize:10,color:"#94a3b8"}}>Permit Matrix + Regulatory Compliance</span>
      <div style={{display:"flex",gap:4,marginLeft:"auto"}}>
        {TABS.map(([t,l])=><button key={t} onClick={()=>setTab(t)} style={{padding:"3px 10px",borderRadius:4,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,background:tab===t?"#3b82f6":"#1e293b",color:tab===t?"white":"#94a3b8"}}>{l}</button>)}
      </div>
    </div>
    <div style={{background:"white",borderBottom:"1px solid #e2e8f0",padding:"4px 12px",display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",flexShrink:0}}>
      <label style={{display:"flex",alignItems:"center",gap:3,fontSize:11,color:"#64748b"}}>Category<select value={filterCat} onChange={e=>setFilterCat(e.target.value)} style={{padding:"2px 4px",border:"1px solid #e2e8f0",borderRadius:4,fontSize:11,background:"#f8fafc",marginLeft:3}}><option>All</option><option>Federal</option><option>State</option><option>Local</option></select></label>
      <label style={{display:"flex",alignItems:"center",gap:3,fontSize:11,color:"#64748b"}}>Phase<select value={filterMatrix} onChange={e=>setFilterMatrix(e.target.value)} style={{padding:"2px 4px",border:"1px solid #e2e8f0",borderRadius:4,fontSize:11,background:"#f8fafc",marginLeft:3}}><option>All</option><option>site</option><option>building</option><option>substation</option><option>ops</option></select></label>
      <label style={{display:"flex",alignItems:"center",gap:3,fontSize:11,color:"#64748b"}}>Resp.<select value={filterResp} onChange={e=>setFilterResp(e.target.value)} style={{padding:"2px 4px",border:"1px solid #e2e8f0",borderRadius:4,fontSize:11,background:"#f8fafc",marginLeft:3}}><option>All</option><option>owner</option><option>gc</option><option>compliance</option><option>ops</option></select></label>
      <label style={{display:"flex",alignItems:"center",gap:3,fontSize:11,color:"#64748b"}}>Type<select value={filterSub} onChange={e=>setFilterSub(e.target.value)} style={{padding:"2px 4px",border:"1px solid #e2e8f0",borderRadius:4,fontSize:11,background:"#f8fafc",marginLeft:3}}>{subcats.map(o=><option key={o}>{o}</option>)}</select></label>
      {[["Gaps",showGaps,()=>setShowGaps(x=>!x),"#92400e"],["CP",showCP,()=>setShowCP(x=>!x),"#dc2626"],["Red Tag",showRT,()=>setShowRT(x=>!x),"#ea580c"]].map(([l,a,fn,c])=><button key={l} onClick={fn} style={{padding:"2px 8px",borderRadius:4,border:`1px solid ${a?c:"#e2e8f0"}`,background:a?c:"white",color:a?"white":"#64748b",cursor:"pointer",fontSize:11}}>{l}</button>)}
      <label style={{display:"flex",alignItems:"center",gap:3,fontSize:11,color:"#64748b",marginLeft:4}}>Sort<select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{padding:"2px 4px",border:"1px solid #e2e8f0",borderRadius:4,fontSize:11,background:sortBy!=="default"?"#eff6ff":"#f8fafc",color:sortBy!=="default"?"#1d4ed8":"inherit",marginLeft:3}}><option value="default">Default</option><option value="start">Start Date</option><option value="sequential">Sequential</option><option value="end">End Date</option><option value="jurisdiction">Jurisdiction</option><option value="duration">Duration</option></select></label>
      <span style={{marginLeft:"auto",fontSize:11,color:"#64748b"}}>{filtered.length}/{permits.length}</span>
      {hasFilter&&<button onClick={clearFilter} style={{padding:"2px 7px",borderRadius:4,border:"1px solid #e2e8f0",background:"white",cursor:"pointer",fontSize:11,color:"#dc2626"}}>✕ Clear</button>}
    </div>
    <div style={{display:"flex",flex:1,overflow:"hidden"}}>
      <div style={{width:275,minWidth:275,background:"white",borderRight:"1px solid #e2e8f0",overflowY:"auto",padding:"9px",flexShrink:0,fontSize:12}}>
        <label style={{display:"block",marginBottom:4}}><span style={{color:"#475569",display:"block",marginBottom:1}}>Project Name</span><input value={form.name} onChange={e=>upd("name",e.target.value)} style={{...inp}} placeholder="e.g. Project Nova"/></label>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,marginBottom:4}}>
          <label style={{display:"block"}}><span style={{color:"#475569",display:"block",marginBottom:1}}>State</span><select value={form.state} onChange={e=>updState(e.target.value)} style={inp}>{STATES.map(s=><option key={s}>{s}</option>)}</select></label>
          <label style={{display:"block"}}><span style={{color:"#475569",display:"block",marginBottom:1}}>County</span><select value={form.county} onChange={e=>updCounty(e.target.value)} style={inp}>{stateCounties.length>0?stateCounties.map(c=><option key={c}>{c}</option>):<option value={form.county||""}>{form.county||"[enter]"}</option>}</select></label>
        </div>
        {attAuto&&<div style={{background:attAuto.s.includes("Non-attainment")?"#fef2f2":"#f0fdf4",border:`1px solid ${attAuto.s.includes("Non-attainment")?"#fecaca":"#bbf7d0"}`,borderRadius:4,padding:"4px 7px",marginBottom:4,fontSize:10}}><div style={{fontWeight:700,color:attAuto.s.includes("Non-attainment")?"#991b1b":"#15803d",marginBottom:1}}>Auto-detected: {attAuto.s.includes("Non-attainment")?"NON-ATTAINMENT":"ATTAINMENT"}</div><div style={{color:"#475569"}}>{attAuto.n}</div></div>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,marginBottom:4}}>
          <label style={{display:"block"}}><span style={{color:"#475569",display:"block",marginBottom:1}}>Site CS</span><input type="date" value={form.site_cs} onChange={e=>upd("site_cs",e.target.value)} style={inp}/></label>
          <label style={{display:"block"}}><span style={{color:"#475569",display:"block",marginBottom:1}}>Bldg CS</span><input type="date" value={form.building_cs} onChange={e=>upd("building_cs",e.target.value)} style={inp}/></label>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,marginBottom:6}}>
          <label style={{display:"block"}}><span style={{color:"#475569",display:"block",marginBottom:1}}>Acres</span><input value={form.acres} onChange={e=>upd("acres",e.target.value)} style={inp}/></label>
          <label style={{display:"block"}}><span style={{color:"#475569",display:"block",marginBottom:1}}>Bldg SF</span><input value={form.sf} onChange={e=>upd("sf",e.target.value)} style={inp}/></label>
        </div>
        <SH label="Scope"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:2,marginBottom:5}}>
          {[["scopeSite","Site/Civil"],["scopeBuilding","Building"],["scopeSubstation","Substation"],["scopeOps","Operations"]].map(([k,l])=><label key={k} style={{display:"flex",alignItems:"center",gap:3,cursor:"pointer",padding:"3px 5px",border:`1px solid ${form[k]?"#3b82f6":"#e2e8f0"}`,borderRadius:4,background:form[k]?"#eff6ff":"white"}}><input type="checkbox" checked={!!form[k]} onChange={e=>upd(k,e.target.checked)} style={{margin:0}}/><span style={{fontSize:11,fontWeight:form[k]?600:400,color:form[k]?"#1d4ed8":"#475569"}}>{l}</span></label>)}
        </div>
        <SF label="Flood Zone" k="floodZone" form={form} upd={upd} opts={["Zone X (Minimal)","Zone AE (100-yr)","Zone AO (Sheet Flow)","Zone VE (Coastal)","Zone X-500 (500-yr)","SFHA -- Other","No FEMA Mapping","TBD"]}/>
        <CF label="Has Floodway" k="hasFloodway" form={form} upd={upd}/>
        <SF label="Brownfield" k="brownfield" form={form} upd={upd} opts={["No","Yes -- Enrolled in BCP","Yes -- Prior ASTM Phase II","Yes -- Remediation Complete","Yes -- Active Remediation","TBD"]}/>
        <SF label="Zoning" k="zoning" form={form} upd={upd} opts={["By-Right Data Center","Heavy Industrial (HI)","Light Industrial (LI)","General Industrial","Commercial","Agricultural","Mixed Use","Requires CUP","Requires Rezoning","TBD"]}/>
        <SF label="Cultural Resources" k="cultural" form={form} upd={upd} opts={["TBD","No Known Resources","Survey Required","SHPO Consultation Required","Section 106 Triggered","Avoidance Required"]}/>
        <SF label="Airport Proximity" k="airport" form={form} upd={upd} opts={["None Within 5 mi","Within 5 mi -- FAA Review Required","Within 3 mi -- Height Restricted","Within 1 mi -- FAA 7460 Required"]}/>
        <SF label="Sensitive Receptors" k="receptors" form={form} upd={upd} opts={["None","Residential -- Adjacent","School","Hospital Nearby","Environmental Justice Community","EJ + Residential","TBD"]}/>
        <SF label="Rock / Bedrock" k="rock" form={form} upd={upd} opts={["TBD","No","Yes -- Depth TBD","Yes -- < 5 ft","Yes -- 5-15 ft","Yes -- > 15 ft"]}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:2,marginBottom:4}}>
          {[["wetlands","Wetlands"],["hasStream","Stream"],["species","Species"],["hasDemo","Demo"],["hasPre1978","Pre-1978"],["traffic","Traffic"],["waterMainReloc","Water Reloc"],["gasExtension","Gas Ext."],["railroadCrossing","RR Cross."]].map(([k,l])=><CF key={k} label={l} k={k} form={form} upd={upd}/>)}
        </div>
        <SH label="Utilities"/>
        <SF label="Power Source" k="power" form={form} upd={upd} opts={["Dedicated Utility Substation","Utility Grid -- Single Feed","Utility Grid -- Dual Feed","Utility Grid + On-Site Gen","Renewable PPA + Grid","TBD"]}/>
        <SF label="Tx Voltage" k="txV" form={form} upd={upd} opts={["138 kV","115 kV","161 kV","230 kV","345 kV","500 kV","765 kV","Distribution (< 35 kV)","TBD"]}/>
        <SF label="Water / Sewer" k="waterSewer" form={form} upd={upd} opts={["TBD","Adequate -- Confirmed","Adequate -- Unconfirmed","Requires Extension","Requires New Infrastructure","Constrained -- Mitigation Required"]}/>
        <SF label="Water Source" k="waterSource" form={form} upd={upd} opts={["TBD","Municipal / Public Water Supply","Private Groundwater Well","Surface Water Withdrawal","Multiple Sources"]}/>
        <SF label="Process Discharge" k="processDischarge" form={form} upd={upd} opts={["TBD","Sanitary Sewer (POTW)","Municipal Stormwater System","Direct Surface Water Discharge","On-site Infiltration / No Direct Discharge"]}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:2,marginBottom:4}}>
          {[["hasCoolingTower","Cooling Tower"],["hasDewater","Dewater"],["hasUST","UST"],["hasOutdoorIndustrial","Outdoor Ind."],["hasRO","RO System"],["hasLargeCoolant","Large Coolant"],["hasPCBRisk","PCB Risk"]].map(([k,l])=><CF key={k} label={l} k={k} form={form} upd={upd}/>)}
        </div>
        <SH label="Energy Storage (BESS)"/>
        <SF label="Battery / Storage Type" k="bess" form={form} upd={upd} opts={["BESS","None","UPS Only","BBU Only","BESS + UPS"]}/>
        <SH label="Generators"/>
        <CF label="Generators On-Site" k="genOn" form={form} upd={upd}/>
        {form.genOn&&<>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:3,marginTop:2,marginBottom:2}}>
            <label style={{display:"block"}}><span style={{color:"#475569",display:"block",marginBottom:1}}>Count</span><input value={form.genCount} onChange={e=>upd("genCount",e.target.value)} style={inp}/></label>
            <label style={{display:"block"}}><span style={{color:"#475569",display:"block",marginBottom:1}}>kW ea.</span><input value={form.genKW} onChange={e=>upd("genKW",e.target.value)} style={inp}/></label>
            <label style={{display:"block"}}><span style={{color:"#475569",display:"block",marginBottom:1}}>Diesel gal</span><input value={form.dieselGal} onChange={e=>upd("dieselGal",e.target.value)} style={inp} placeholder="e.g. 5000"/></label>
          </div>
          <SF label="Fuel" k="genFuel" form={form} upd={upd} opts={["Diesel","Natural gas","Dual fuel"]}/>
          <SF label="Usage Type" k="genUsage" form={form} upd={upd} opts={["Emergency standby (100 hrs/yr max)","Non-emergency / BTM / continuous"]}/>
        </>}
        <SH label="BTM Generation"/>
        <CF label="BTM Generation On-Site" k="btmOn" form={form} upd={upd}/>
        {form.btmOn&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:3,marginTop:2}}>
          <label style={{display:"block"}}><span style={{color:"#475569",display:"block",marginBottom:1}}>Capacity (MW)</span><input value={form.btmMW} onChange={e=>upd("btmMW",e.target.value)} style={inp}/></label>
          <SF label="Fuel" k="btmFuel" form={form} upd={upd} opts={["Natural gas","Diesel","Dual fuel"]}/>
        </div>}
        <SH label="Air Quality"/>
        <SF label="Attainment Zone" k="attainment" form={form} upd={upd} opts={["TBD -- confirm with air quality consultant","Attainment zone (250 TPY PSD threshold)","Non-attainment zone (100 TPY NSR threshold)"]}/>
        <button onClick={()=>setForm(INIT)} style={{width:"100%",marginTop:8,padding:"4px",borderRadius:4,border:"1px solid #e2e8f0",background:"#f8fafc",cursor:"pointer",fontSize:11,color:"#64748b"}}>Reset to Defaults</button>
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{flex:1,overflowY:"auto",padding:"10px 12px"}}>
          {tab==="summary"&&<ExecSummary permits={filtered} form={form} stateNote={stateNote}/>}
          {tab==="permits"&&<div style={{display:"flex",flexDirection:"column",height:"100%"}}>
            <div style={{display:"flex",gap:0,borderBottom:"1px solid #e2e8f0",marginBottom:10,flexShrink:0}}>
              {[["matrix","Matrix"],["schedule","Schedule"]].map(([s,l])=><button key={s} onClick={()=>setSubTab(s)} style={{padding:"5px 16px",border:"none",borderBottom:`2px solid ${subTab===s?"#3b82f6":"transparent"}`,background:"transparent",cursor:"pointer",fontSize:12,fontWeight:subTab===s?700:400,color:subTab===s?"#1d4ed8":"#64748b"}}>{l}</button>)}
            </div>
            {subTab==="matrix"&&<MatrixGrid permits={filtered} form={form} sortBy={sortBy}/>}
            {subTab==="schedule"&&<ScheduleView permits={filtered} form={form} sortBy={sortBy}/>}
          </div>}
        </div>
        <Legend/>
      </div>
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(Percy));
</script>
</body>
</html>
